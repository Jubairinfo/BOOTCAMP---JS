<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 13 - Comment System</title>
  <style>
    .commentBox {
      border: 2px solid #333;
      padding: 15px;
      width: 300px;
      border-radius: 8px;
    }
    textarea {
      width: 100%;
      height: 60px;
    }
    ul {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>Simple Comment Board</h2>

<div class="commentBox" id="app"></div>

<script>
  // 1. Empty array
  let storedComments = [];

  const app = document.getElementById("app");

  // Create textarea
  let textField = document.createElement("textarea");
  textField.placeholder = "Write your comment...";

  // Create button
  let addBtn = document.createElement("button");
  addBtn.textContent = "Post Comment";

  // Create display area
  let commentArea = document.createElement("div");

  app.append(textField, addBtn, commentArea);

  function showComments() {
    commentArea.innerHTML = "";

    if (storedComments.length === 0) {
      commentArea.textContent = "No comments yet.";
      return;
    }

    let ul = document.createElement("ul");

    // show last 5 comments (latest first)
    let recentComments = storedComments.slice(-5).reverse();

    for (let i = 0; i < recentComments.length; i++) {
      let li = document.createElement("li");
      li.textContent = recentComments[i];
      ul.appendChild(li);
    }

    commentArea.appendChild(ul);
  }

  addBtn.onclick = function () {
    let msg = textField.value.trim();

    if (msg === "") {
      alert("Please enter a comment!");
      return;
    }

    // Store comment
    storedComments.push(msg);
    console.log("Saved:", storedComments);

    textField.value = "";
    showComments();
  };

  // Initial render
  showComments();
</script>

</body>
</html>
