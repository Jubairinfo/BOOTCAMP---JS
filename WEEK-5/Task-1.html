<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 1 - Advanced Function Operations</title>
</head>
<body>

<script>


function calculateSum(a, b) {
    return a + b;
}


function calculateProduct(a, b) {
    return a * b;
}


let sumNum1 = 10;
let sumNum2 = 90;


let productNum1 = 10;
let productNum2 = 2;


let sumResult = calculateSum(sumNum1, sumNum2);
let productResult = calculateProduct(productNum1, productNum2);


console.log("Sum Result:");
console.log(`Sum of ${sumNum1} and ${sumNum2} is: ${sumResult}`);

console.log("Product Result:");
console.log(`Product of ${productNum1} and ${productNum2} is: ${productResult}`);

</script>

</body>
</html>
