<!DOCTYPE html>

<meta charset="UTF-8">
<title>Task 5 - IIFE Example</title>
</head>
<body>

<script>

// Immediately Invoked Function Expression (IIFE)
let result = (function () {

    
    let num1 = 10;
    let num2 = 30;

    
    let sum = num1 + num2;

    return sum;

})();



console.log("Result of IIFE calculation:", result);

</script>

</body>
</html>
