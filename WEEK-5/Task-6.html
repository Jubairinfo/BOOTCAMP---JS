<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task 6 - Form Validation</title>
</head>

<body>

<form id="userForm">

<label>
Name:
<input type="text" id="nameInput" placeholder="Enter your name">
</label>

<br><br>

<label>
Email:
<input type="email" id="emailInput" placeholder="example@gmail.com">
</label>

<br><br>

<button type="submit">Submit</button>

</form>

<script>

const form = document.getElementById("userForm");

form.addEventListener("submit", function(event){

let nameValue = document.getElementById("nameInput").value.trim();
let emailValue = document.getElementById("emailInput").value.trim();

if(nameValue === ""){
console.log("Name field is empty");
event.preventDefault();
}

else if(emailValue === ""){
console.log("Email field is empty");
event.preventDefault();
}

else{
console.log("Form submitted successfully");
}

});

</script>

</body>
</html>
